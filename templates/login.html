<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0c">
  <title>Acesso — {{ config.store_name or 'Royal' }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon-64.png') }}">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .login-card {
      background: linear-gradient(160deg, var(--surface-2), var(--surface) 60%),
                  radial-gradient(120% 80% at 100% 0%, rgba(124,58,237,.25), transparent 60%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 40px 34px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .login-card img { height: 120px; width: auto; margin: 0 auto 8px;
      filter: drop-shadow(0 0 22px rgba(255,214,10,.25)); }
    .login-card h1 { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
    .login-card p.hint { color: var(--text-dim); font-size: .85rem; margin-bottom: 26px; }
    .login-card input[type=password],
    .login-card input[type=text] {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      text-align: center;
      outline: none;
      transition: border .2s, box-shadow .2s;
      margin-bottom: 14px;
    }
    .login-card input[type=password] { letter-spacing: 3px; }
    .login-card input:focus { border-color: var(--primary-yellow); box-shadow: 0 0 0 3px rgba(255,214,10,.12); }
    .login-card button {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      background: linear-gradient(120deg, var(--primary-yellow), var(--yellow-soft));
      color: #000;
      font-weight: 800;
      font-size: 1rem;
      transition: box-shadow .2s, transform .1s;
    }
    .login-card button:hover { box-shadow: var(--glow); }
    .login-card button:active { transform: scale(.97); }
    .login-error {
      background: rgba(255,90,90,.1);
      border: 1px solid rgba(255,90,90,.3);
      color: #ff8a8a;
      font-size: .82rem;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .login-back { display: inline-block; margin-top: 20px; color: var(--text-dim); font-size: .82rem; }
    .login-back:hover { color: var(--primary-yellow); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="{{ config.store_name or 'Royal' }}">
      <h1>Painel Administrativo</h1>
      <p class="hint">Digite seu usuário e senha para acessar</p>
      {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
      <form method="POST">
        <input type="text" name="username" placeholder="Usuário" autofocus autocomplete="username">
        <input type="password" name="password" placeholder="••••••" autocomplete="current-password">
        <button type="submit">Entrar</button>
      </form>
      <a href="/" class="login-back">← Voltar para a loja</a>
    </div>
  </div>
</body>
</html>
