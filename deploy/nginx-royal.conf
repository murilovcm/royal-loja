server {
    listen 80;
    # >>> TROQUE seudominio.com.br pelo SEU domínio real (duas vezes abaixo) <<<
    server_name seudominio.com.br www.seudominio.com.br;

    # Este bloco fica só em HTTP até você rodar a Fase 6 do guia de deploy
    # (certbot --nginx ... --redirect --hsts), que reescreve este arquivo
    # automaticamente para redirecionar tudo para HTTPS. Não pule a Fase 6 —
    # sem ela, o cookie de sessão do /admin pode trafegar sem criptografia.

    client_max_body_size 10M;   # permite upload de imagens de produtos

    location /static/ {
        alias /var/www/royal/static/;
        expires 7d;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/var/www/royal/royal.sock;
    }
}
